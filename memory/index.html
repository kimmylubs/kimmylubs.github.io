<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Memory</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="../shared.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <script src="/nav.js"></script>
  <h1 class="page-title">Memory Match</h1>
  <div class="game-bar">
    <span class="stat">Moves: <strong id="moves">0</strong></span>
    <button id="restart-btn">New Game</button>
    <span class="stat">Time: <strong id="timer">0:00</strong></span>
  </div>
  <div class="board" id="board"></div>
  <div class="win-overlay hidden" id="win-overlay">
    <div class="win-card card">
      <div class="win-stars" id="win-stars"></div>
      <h2>you won! ♡</h2>
      <p class="win-stats" id="win-stats"></p>
      <button id="win-restart">Play Again</button>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
