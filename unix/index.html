  <h1 class="page-title">Unix Time Generator</h1>
  <div class="unix-card card">
    <form>
      <label for="date">Select a date:</label>
      <input type="date" id="date" value="">
      <label for="time">Select a time:</label>
      <input type="time" id="time" value="12:00">
      <div class="unix-buttons">
        <button type="button" onclick="generateUnixTime()">Generate Unix Time</button>
        <button type="button" onClick="copyButton(generateUnixTime())">Copy Discord Format</button>
      </div>
      <p class="unix-hint">Clicking "Copy Discord Format" puts it on your clipboard, ready to paste.</p>
    </form>
    <p id="unix-time" class="unix-result"></p>
  </div>

  <script>
    const dateInput = document.getElementById('date');
    const today = new Date();
    const year = today.getFullYear();
    const month = today.getMonth() + 1;
    const day = today.getDate();
    dateInput.value = `${year}-${month.toString().padStart(2,'0')}-${day.toString().padStart(2,'0')}`;

    function generateUnixTime() {
      const dateVal = document.getElementById('date').value;
      const timeVal = document.getElementById('time').value;
      const [y, m, d] = dateVal.split('-').map(Number);
      const [h, min] = timeVal.split(':').map(Number);
      const date = new Date(y, m - 1, d, h, min, 0);
      const unixTime = Math.floor(date.getTime() / 1000);
      const formatted = `<t:${unixTime}:F>`;
      document.getElementById('unix-time').textContent = `Unix Time: ${unixTime}`;
      return formatted;
    }

    function copyButton(text) {
      navigator.clipboard.writeText(text).then(() => {
        console.log('Copied to clipboard!');
      }, (err) => {
        console.error('Failed to copy:', err);
      });
    }
  </script>

  <script src="script.js"></script>
