  <h1 class="page-title">My Pet</h1>

  <div class="pet-page">
    <div class="pet-card card">
      <!-- Bunny art -->
      <div class="bunny-wrap">
        <div class="bunny" id="bunny">
          <div class="b-ears">
            <div class="b-ear"><div class="b-ear-inner"></div></div>
            <div class="b-ear"><div class="b-ear-inner"></div></div>
          </div>
          <div class="b-head">
            <div class="b-eyes">
              <div class="b-eye" id="eye-l"></div>
              <div class="b-eye" id="eye-r"></div>
            </div>
            <div class="b-cheeks">
              <div class="b-cheek"></div>
              <div class="b-cheek"></div>
            </div>
            <div class="b-mouth" id="mouth"></div>
          </div>
          <div class="b-body">
            <div class="b-tail"></div>
          </div>
        </div>
      </div>

      <!-- Name -->
      <div class="name-row">
        <span id="pet-name-display" class="pet-name">Mochi</span>
        <button class="icon-btn" id="rename-btn" title="Rename">✏️</button>
      </div>
      <div class="rename-row hidden" id="rename-row">
        <input type="text" id="rename-input" maxlength="12" placeholder="New name...">
        <button id="rename-save">Save</button>
      </div>

      <!-- Status message -->
      <p class="pet-msg" id="pet-msg">hi there!</p>

      <!-- Stats -->
      <div class="stats">
        <div class="stat-row">
          <span class="stat-label">🍎 Food</span>
          <div class="stat-bar"><div class="stat-fill food" id="bar-food"></div></div>
          <span class="stat-val" id="val-food">80</span>
        </div>
        <div class="stat-row">
          <span class="stat-label">✨ Happy</span>
          <div class="stat-bar"><div class="stat-fill happy" id="bar-happy"></div></div>
          <span class="stat-val" id="val-happy">70</span>
        </div>
      </div>

      <!-- Actions -->
      <div class="actions">
        <button id="btn-feed">🍎 Feed</button>
        <button id="btn-play">🎀 Play</button>
        <button id="btn-sleep">💤 Sleep</button>
      </div>

      <!-- Info -->
      <p class="pet-info" id="pet-info"></p>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
