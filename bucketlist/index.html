  <div class="bl-layout">
    <aside class="bl-sidebar">
      <div class="bl-sidebar-header">
        <h2>Places I've Been</h2>
        <span class="bl-count" id="bl-count">0</span>
      </div>


      <div class="bl-filter" id="bl-filter"></div>

      <ul class="bl-list" id="bl-list"></ul>

      <div class="bl-add-form" id="bl-add-form" style="display:none">
        <div class="autocomplete-wrap">
          <div class="input-ghost" id="input-ghost"></div>
          <input type="text" id="add-input" placeholder="Add a place…" autocomplete="off">
          <ul class="autocomplete-dropdown" id="ac-dropdown"></ul>
        </div>
        <div class="year-row">
          <select id="year-select"></select>
          <button class="year-edit-btn" onclick="window.toggleYearEditor()">✎</button>
        </div>
        <button onclick="window.addPlace()">Add</button>
      </div>

      <div class="year-editor" id="year-editor" style="display:none">
        <div id="year-editor-list"></div>
        <div class="year-editor-add">
          <input type="text" id="year-new-input" placeholder="New category…">
          <button onclick="window.addYearOption()">+</button>
        </div>
      </div>
    </aside>
    <div id="map"></div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="data.js"></script>
  <script src="script.js"></script>
</body>
